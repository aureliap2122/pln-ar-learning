<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>PLN AR Module</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      /* Hide default AR.js UI if needed */
      .a-enter-vr-button {
        display: none;
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <script>
      // Component to handle interaction from parent window
      AFRAME.registerComponent('ar-controller', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            window.parent.postMessage({ type: 'MODEL_LOADED' }, '*');
          });

          // Listen for messages from React parent
          window.addEventListener('message', (event) => {
            const data = event.data;
            if (data.type === 'ROTATE') {
              const currentRot = this.el.getAttribute('rotation');
              this.el.setAttribute('rotation', {
                x: currentRot.x,
                y: currentRot.y + data.value,
                z: currentRot.z
              });
            } else if (data.type === 'ZOOM') {
              const currentScale = this.el.getAttribute('scale');
              this.el.setAttribute('scale', {
                x: currentScale.x * data.value,
                y: currentScale.y * data.value,
                z: currentScale.z * data.value
              });
            } else if (data.type === 'SET_STEP') {
              // Handle step highlight if you have a multi-part model
              // For now we just log it or pass it back
              console.log('Step set to:', data.step);
            }
          });
        }
      });
      
      // Basic raycaster for clicking parts (if model has distinct meshes)
      AFRAME.registerComponent('clickable', {
        init: function () {
          this.el.addEventListener('click', (evt) => {
            window.parent.postMessage({ 
              type: 'PART_CLICKED', 
              partId: this.el.id || 'Tiang Utama'
            }, '*');
          });
        }
      });
    </script>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      renderer="antialias: true; alpha: true"
      cursor="rayOrigin: mouse"
      raycaster="objects: .clickable"
    >
      <!-- Assets -->
      <a-assets>
        <!-- In a real scenario, put your pole.glb here -->
        <!-- We use a basic primitive if GLB is missing, but let's assume we have a GLB -->
        <!-- <a-asset-item id="poleModel" src="/models/pole.glb"></a-asset-item> -->
      </a-assets>

      <!-- Hiro Marker -->
      <a-marker preset="hiro">
        <!-- The 3D Object -->
        <a-entity 
          id="ar-model"
          ar-controller
          class="clickable"
          geometry="primitive: cylinder; height: 3; radius: 0.1" 
          material="color: #666666" 
          position="0 1.5 0"
          rotation="0 0 0"
          scale="1 1 1">
            <!-- Example attachment: Trafo -->
            <a-entity 
              id="Trafo"
              class="clickable"
              geometry="primitive: box; width: 0.6; height: 0.8; depth: 0.5" 
              material="color: #007bb5" 
              position="0 1 0.3">
            </a-entity>
            <!-- Example attachment: Isolator -->
            <a-entity 
              id="Isolator"
              class="clickable"
              geometry="primitive: cone; height: 0.2; radiusBottom: 0.1; radiusTop: 0.05" 
              material="color: #feca00" 
              position="0 1.6 0">
            </a-entity>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
